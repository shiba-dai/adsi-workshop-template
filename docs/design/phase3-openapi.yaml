openapi: 3.0.3
info:
  title: 勤怠管理アプリ - Phase 3 API
  description: 社員マスタ・部署管理・カレンダー管理（ADMIN専用）
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: 開発環境

security:
  - sessionAuth: []

paths:
  # --- 部署管理 ---
  /api/admin/departments:
    get:
      tags: [部署管理]
      summary: 部署一覧（ツリー構造）
      operationId: getDepartmentTree
      responses:
        '200':
          description: 部署ツリー
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DepartmentTreeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [部署管理]
      summary: 部署作成
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDepartmentRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/departments/{id}:
    parameters:
      - $ref: '#/components/parameters/DepartmentId'
    get:
      tags: [部署管理]
      summary: 部署詳細
      operationId: getDepartment
      responses:
        '200':
          description: 部署詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [部署管理]
      summary: 部署更新
      operationId: updateDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDepartmentRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DepartmentResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/departments/{id}/disable:
    parameters:
      - $ref: '#/components/parameters/DepartmentId'
    put:
      tags: [部署管理]
      summary: 部署無効化
      operationId: disableDepartment
      responses:
        '204':
          description: 無効化成功
        '400':
          description: 所属社員がいるため無効化不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # --- 社員マスタ管理 ---
  /api/admin/employees:
    get:
      tags: [社員管理]
      summary: 社員一覧（ページネーション）
      operationId: getEmployees
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: keyword
          in: query
          schema:
            type: string
          description: 氏名・社員番号・メールで部分一致検索
      responses:
        '200':
          description: 社員一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeePageResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [社員管理]
      summary: 社員作成
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/employees/{id}:
    parameters:
      - $ref: '#/components/parameters/EmployeeId'
    get:
      tags: [社員管理]
      summary: 社員詳細
      operationId: getEmployee
      responses:
        '200':
          description: 社員詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [社員管理]
      summary: 社員更新
      operationId: updateEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDetailResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/employees/{id}/disable:
    parameters:
      - $ref: '#/components/parameters/EmployeeId'
    put:
      tags: [社員管理]
      summary: 社員無効化
      operationId: disableEmployee
      responses:
        '204':
          description: 無効化成功
        '400':
          description: 自分自身の無効化は不可
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/employees/{id}/departments:
    parameters:
      - $ref: '#/components/parameters/EmployeeId'
    put:
      tags: [社員管理]
      summary: 部署割当変更
      operationId: assignDepartments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDepartmentsRequest'
      responses:
        '204':
          description: 割当変更成功
        '400':
          $ref: '#/components/responses/BadRequest'

  # --- カレンダー管理 ---
  /api/admin/calendar/holidays:
    get:
      tags: [カレンダー管理]
      summary: 休日一覧（年単位）
      operationId: getHolidays
      parameters:
        - name: year
          in: query
          required: true
          schema:
            type: integer
          description: 対象年（例: 2026）
      responses:
        '200':
          description: 休日一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HolidayResponse'
    post:
      tags: [カレンダー管理]
      summary: 休日登録
      operationId: createHoliday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHolidayRequest'
      responses:
        '201':
          description: 登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidayResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/calendar/holidays/bulk:
    post:
      tags: [カレンダー管理]
      summary: 年間祝日一括登録
      operationId: bulkCreateHolidays
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateHolidaysRequest'
      responses:
        '201':
          description: 一括登録成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HolidayResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/calendar/holidays/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      tags: [カレンダー管理]
      summary: 休日更新
      operationId: updateHoliday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHolidayRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HolidayResponse'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [カレンダー管理]
      summary: 休日削除
      operationId: deleteHoliday
      responses:
        '204':
          description: 削除成功
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

  parameters:
    DepartmentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    EmployeeId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    # --- Request ---
    CreateDepartmentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        parentId:
          type: integer
          format: int64
          nullable: true
        displayOrder:
          type: integer
          default: 0

    UpdateDepartmentRequest:
      type: object
      required: [name, version]
      properties:
        name:
          type: string
          maxLength: 100
        parentId:
          type: integer
          format: int64
          nullable: true
        displayOrder:
          type: integer
        version:
          type: integer
          format: int64

    CreateEmployeeRequest:
      type: object
      required: [employeeCode, name, email, password, role]
      properties:
        employeeCode:
          type: string
          maxLength: 20
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [EMPLOYEE, MANAGER, ADMIN]

    UpdateEmployeeRequest:
      type: object
      required: [name, email, role, version]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [EMPLOYEE, MANAGER, ADMIN]
        version:
          type: integer
          format: int64

    AssignDepartmentsRequest:
      type: object
      required: [mainDepartmentId]
      properties:
        mainDepartmentId:
          type: integer
          format: int64
        subDepartmentIds:
          type: array
          items:
            type: integer
            format: int64

    CreateHolidayRequest:
      type: object
      required: [holidayDate, name, holidayType]
      properties:
        holidayDate:
          type: string
          format: date
        name:
          type: string
          maxLength: 100
        holidayType:
          type: string
          enum: [NATIONAL_HOLIDAY, COMPANY_HOLIDAY]

    UpdateHolidayRequest:
      type: object
      required: [name, holidayType, version]
      properties:
        name:
          type: string
          maxLength: 100
        holidayType:
          type: string
          enum: [NATIONAL_HOLIDAY, COMPANY_HOLIDAY]
        version:
          type: integer
          format: int64

    BulkCreateHolidaysRequest:
      type: object
      required: [holidays]
      properties:
        holidays:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateHolidayRequest'

    # --- Response ---
    DepartmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        parentId:
          type: integer
          format: int64
          nullable: true
        displayOrder:
          type: integer
        enabled:
          type: boolean
        version:
          type: integer
          format: int64

    DepartmentTreeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        displayOrder:
          type: integer
        enabled:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentTreeResponse'

    EmployeeDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
        enabled:
          type: boolean
        mainDepartment:
          $ref: '#/components/schemas/DepartmentResponse'
        subDepartments:
          type: array
          items:
            $ref: '#/components/schemas/DepartmentResponse'
        version:
          type: integer
          format: int64

    EmployeePageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeDetailResponse'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        number:
          type: integer
        size:
          type: integer

    HolidayResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        holidayDate:
          type: string
          format: date
        name:
          type: string
        holidayType:
          type: string
        version:
          type: integer
          format: int64

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        message:
          type: string
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: バリデーションエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: リソースが見つからない
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 競合（重複・楽観ロック）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
